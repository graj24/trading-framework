# Alembic config for AGORA control plane.
# Run from 2.0/. The actual database URL is resolved at runtime in env.py from
# the POSTGRES_URL env var (Pydantic Settings); the placeholder below is only
# used when alembic is invoked without environment overrides.

[alembic]
script_location = src/agora/platform/control_plane/migrations
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is intentionally blank — env.py reads POSTGRES_URL.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
