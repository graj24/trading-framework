name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: NVIDIA_NIM_API_KEY,GROQ_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -e
            cd /app

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Remove dev .env.local so production build uses relative URLs
            rm -f /app/frontend/.env.local

            # Sync API keys from GitHub secrets to /app/.env.
            # Only updates keys that are set (non-empty) in secrets — won't
            # blank out keys that weren't passed.
            update_env_key() {
              local KEY="$1" VALUE="$2"
              [ -z "$VALUE" ] && return
              if grep -q "^${KEY}=" /app/.env 2>/dev/null; then
                sed -i "s|^${KEY}=.*|${KEY}=${VALUE}|" /app/.env
              else
                echo "${KEY}=${VALUE}" >> /app/.env
              fi
            }
            update_env_key "NVIDIA_NIM_API_KEY"    "$NVIDIA_NIM_API_KEY"
            update_env_key "GROQ_API_KEY"          "$GROQ_API_KEY"
            update_env_key "TELEGRAM_BOT_TOKEN"    "$TELEGRAM_BOT_TOKEN"
            update_env_key "TELEGRAM_CHAT_ID"      "$TELEGRAM_CHAT_ID"

            # Rebuild frontend only if it changed
            if git diff HEAD@{1} HEAD --name-only | grep -q "^frontend/"; then
              cd /app/frontend && npm ci --silent && npm run build
              cd /app
            fi

            # Restart services
            sudo systemctl restart trading-api
            sudo systemctl restart trading-daemon

            echo "Deploy complete"
